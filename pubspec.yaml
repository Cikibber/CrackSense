name: drone_crack_detection
description: Drone-Based Wall Crack Detection mobile application with Edge AI.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^3.0.0

  # MQTT Protocol
  mqtt_client: ^10.6.0

  # Edge AI - TFLite
  tflite_flutter: ^0.12.1

  # Local Storage
  hive_ce: ^2.19.1
  hive_ce_flutter: ^2.3.4

  # Image Processing
  image: ^4.5.3
  image_picker: ^1.1.2

  # Navigation
  go_router: ^15.1.1

  # UI & Typography
  google_fonts: ^6.2.1
  fl_chart: ^0.70.2

  # Utilities
  path_provider: ^2.1.5
  intl: ^0.20.2
  uuid: ^4.5.1
  typed_data: ^1.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  hive_ce_generator: ^1.9.0
  build_runner: ^2.4.14

flutter:
  uses-material-design: true

  assets:
    - assets/models/
    - assets/images/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
